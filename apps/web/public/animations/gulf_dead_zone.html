      const tabsEl = document.getElementById("tabs");
      tabsEl.innerHTML = "";

      CONFIG.tabs.forEach((t, i) => {
        const d = document.createElement("div");
        d.className =
          "tab" + (t.theme ? " " + t.theme : "") + (i === 0 ? " active" : "");
        d.id = "t" + i;
        d.textContent = t.icon + " " + t.label;
        d.onclick = () => go(i);
        tabsEl.appendChild(d);
      });
      // helpers
      function mkPrompt(p, th) {
        const d = document.createElement("div");
        d.className = "prompt " + th;
        d.innerHTML = `<div class="plbl"><span class="dot"></span>${p.label}</div>
  <div class="pq">${p.question}</div>
  ${p.hint ? `<div class="ph">${p.hint}</div>` : ""}
  <textarea class="${p.tall ? "tall" : ""}" placeholder="${p.placeholder}"></textarea>`;
        return d;
      }
      function mkFlow(steps, th) {
        const d = document.createElement("div");
        d.className = "flow";
        steps.forEach((s, i) => {
          const isDead =
            s.includes("💀") || s.includes("🌧️") || s.includes("🔥");
          const sp = document.createElement("span");
          sp.className = "fn " + (isDead ? "dead" : th);
          sp.textContent = s;
          d.appendChild(sp);
          if (i < steps.length - 1) {
            const a = document.createElement("span");
            a.className = "fa";
            a.textContent = "→";
            d.appendChild(a);
          }
        });
        return d;
      }
      function mkChips(chips, th) {
        const d = document.createElement("div");
        d.className = "chips";
        chips.forEach((c) => {
          const sp = document.createElement("span");
          sp.className = "chip " + (typeof c === "object" ? c.theme : th);
          sp.textContent = typeof c === "object" ? c.label : c;
          d.appendChild(sp);
        });
        return d;
      }
      function mkCallout(c, th) {
        const d = document.createElement("div");
        d.className = "callout " + th;
        d.innerHTML = `<h4>${c.title}</h4>${c.body}`;
        return d;
      }
      function mkNav(back, fwd, lbl, cls, step) {
        const d = document.createElement("div");
        d.className = "nav";
        d.innerHTML = `${back >= 0 ? `<button class="btn btn-ghost" onclick="go(${back})">← Back</button>` : "<span></span>"}
  <span class="slbl">${step}</span>
  <button class="btn ${cls}" onclick="${fwd === "print" ? "window.print()" : "go(" + fwd + ")"}">${lbl}</button>`;
        return d;
      }
      function mkVC(svgId, captTitle, captBody, titleColor = "") {
        const d = document.createElement("div");
        d.className = "vc";
        const tpl = document.getElementById(svgId);
        if (tpl) d.appendChild(tpl.content.cloneNode(true));
        const cap = document.createElement("div");
        cap.className = "vcap";
        cap.innerHTML = `<h2 style="${titleColor ? "color:" + titleColor : ""}">${captTitle}</h2><p>${captBody}</p>`;
        d.appendChild(cap);
        return d;

      const SC = document.getElementById("scenes");

        mkVC("svg-intro", CONFIG.intro.captionTitle, CONFIG.intro.captionBody),

      s0.appendChild(mkNav(-1, 1, CONFIG.intro.btnLabel, "btn-n", "01/05"));

      const motionBtn = document.getElementById("ctrl-motion");

      const focusBtn = document.getElementById("ctrl-focus");

      const prevBtn = document.getElementById("ctrl-prev");
      const nextBtn = document.getElementById("ctrl-next");
      const scenePill = document.getElementById("ctrl-scene");

      function setSvgMotionPaused(paused) {
        document.querySelectorAll("svg").forEach((svg) => {
          if (typeof svg.pauseAnimations !== "function") return;
          if (paused) svg.pauseAnimations();
          else svg.unpauseAnimations();
        });
      }

      function setMotionPaused(paused) {
        window.__gulfMotionPaused = paused;
        document.body.classList.toggle("motion-paused", paused);
        setSvgMotionPaused(paused);
        motionBtn.textContent = paused ? "Resume Motion" : "Pause Motion";
        motionBtn.classList.toggle("active", paused);
      }

      function updateTeacherUi() {
        scenePill.textContent = `Scene ${cur + 1} / ${CONFIG.tabs.length}`;
        prevBtn.disabled = cur === 0;
        nextBtn.disabled = cur === CONFIG.tabs.length - 1;
      }

      prevBtn.onclick = () => go(cur - 1);
      nextBtn.onclick = () => go(cur + 1);
      motionBtn.onclick = () => setMotionPaused(!window.__gulfMotionPaused);
      readableBtn.onclick = () => {
        const on = document.body.classList.toggle("readable");
        readableBtn.classList.toggle("active", on);
      };
      focusBtn.onclick = () => {
        const on = document.body.classList.toggle("focus-mode");
        focusBtn.classList.toggle("active", on);
      };
      spotlightBtn.onclick = () => {
        const on = document.body.classList.toggle("spotlight-on");
        spotlightBtn.classList.toggle("active", on);
      };
      if (downloadBtn) {
        downloadBtn.onclick = async () => {
          let html;
          try {
            const res = await fetch(window.location.href, {
              cache: "no-store",
            });
            if (!res.ok) throw new Error("fetch failed");
            html = await res.text();
          } catch (_err) {
            html = "<!doctype html>\n" + document.documentElement.outerHTML;
          }
          const blob = new Blob([html], { type: "text/html;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "gulf-dead-zone-experience.html";
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 250);
        };
      }

      document.addEventListener("mousemove", (e) => {
        if (!document.body.classList.contains("spotlight-on")) return;
        document.body.style.setProperty("--sx", `${e.clientX}px`);
        document.body.style.setProperty("--sy", `${e.clientY}px`);
      });

      document.addEventListener("keydown", (e) => {
        const tag = (e.target && e.target.tagName) || "";
        if (tag === "TEXTAREA" || tag === "INPUT") return;
        if (e.key === "ArrowRight") {
          e.preventDefault();
          go(cur + 1);
        }
        if (e.key === "ArrowLeft") {
          e.preventDefault();
          go(cur - 1);
        }
        if (e.key === " ") {
          e.preventDefault();
          setMotionPaused(!window.__gulfMotionPaused);
        }
      });

      function go(n) {
        if (n < 0 || n >= CONFIG.tabs.length) return;
        document.getElementById("s" + cur).classList.remove("on");
        document.querySelectorAll(".tab").forEach((t, i) => {
          t.classList.remove("active");
          if (i < n) t.classList.add("done");
          else t.classList.remove("done");
        });
        cur = n;
        document.getElementById("s" + n).classList.add("on");
        document.querySelectorAll(".tab")[n].classList.add("active");
        updateTeacherUi();
        if (window.__gulfMotionPaused) setSvgMotionPaused(true);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      updateTeacherUi();
    </script>

    <script>
      // ═══════════════════════════════════════════════════════════
      // FISH ENGINE — requestAnimationFrame, no SMIL, no teleport
      // Fish bounce within swim lanes; fR/fL bodies swap on turn.
      // Runs once; querySelector finds elements in any visible SVG.
      // ═══════════════════════════════════════════════════════════
      (function () {
        const FISH = [
          // id,       start x, y,   dx,    dy,   xMin, xMax, yMin, yMax, wobble phase
          {
            id: "iFish1",
            x: 280,
            y: 310,
            dx: 0.5,
            dy: 0.06,
            xMin: 290,
            xMax: 855,
            yMin: 304,
            yMax: 332,
            w: 0.0,
          },
          {
            id: "iFish2",
            x: 670,
            y: 320,
            dx: -0.35,
            dy: 0.05,
            xMin: 290,
            xMax: 855,
            yMin: 307,
            yMax: 336,
            w: 1.9,
          },
          {
            id: "nFish1",
            x: 400,
            y: 265,
            dx: 0.42,
            dy: 0.04,
            xMin: 580,
            xMax: 820,
            yMin: 266,
            yMax: 285,
            w: 0.7,
          },
          {
            id: "cFish1",
            x: 360,
            y: 308,
            dx: 0.44,
            dy: 0.06,
            xMin: 340,
            xMax: 855,
            yMin: 306,
            yMax: 350,
            w: 1.1,
          },
          {
            id: "cFish1b",
            x: 580,
            y: 320,
            dx: -0.32,
            dy: 0.04,
            xMin: 340,
            xMax: 855,
            yMin: 310,
            yMax: 354,
            w: 2.5,
          },
        ];

        let last = null;

        function tick(ts) {
          if (window.__gulfMotionPaused) {
            last = ts;
            requestAnimationFrame(tick);
            return;
          }

          const raw = last === null ? 16 : ts - last;
          last = ts;
          const dt = Math.min(raw, 48); // cap to avoid jump on tab refocus

          for (const f of FISH) {
            // update position
            f.w += dt * 0.0018;
            f.x += f.dx * dt * 0.055;
            f.y += (f.dy + Math.sin(f.w) * 0.25) * dt * 0.038;

            // bounce — clamp then flip, never teleport
            if (f.x < f.xMin) {
              f.x = f.xMin;
              f.dx = Math.abs(f.dx);
            }
            if (f.x > f.xMax) {
              f.x = f.xMax;
              f.dx = -Math.abs(f.dx);
            }
            if (f.y < f.yMin) {
              f.y = f.yMin;
              f.dy = Math.abs(f.dy);
            }
            if (f.y > f.yMax) {
              f.y = f.yMax;
              f.dy = -Math.abs(f.dy);
            }

            // find element (may be in any currently-rendered SVG copy)
            const el = document.getElementById(f.id);
            if (!el) continue;

            el.setAttribute(
              "transform",
              `translate(${f.x.toFixed(1)},${f.y.toFixed(1)})`,
            );

            // Keep fish behind labels/overlays in each SVG scene.
            const parent = el.parentNode;
            if (parent && parent.firstChild !== el)
              parent.insertBefore(el, parent.firstChild);

            const fR = el.querySelector(".fR");
            const fL = el.querySelector(".fL");
            if (fR && fL) {
              const goRight = f.dx >= 0;
              fR.style.display = goRight ? "none" : "inline";
              fL.style.display = goRight ? "inline" : "none";
            }

            // Add shadowy look when fish pass under busy structure/text zones.
            const behindZone =
              (f.id === "nFish1" && f.x < 700) ||
              ((f.id === "cFish1" || f.id === "cFish1b") && f.x < 650);
            el.style.opacity = behindZone ? "0.46" : "1";
            el.style.filter = behindZone
              ? "saturate(0.55) brightness(0.72)"
              : "none";
          }

          requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
      })();

      // Lightweight blink pass for fish and the carbon cow so all animals blink.
      (function () {
        let lastBlink = 0;
        function blink(ts) {
          if (ts - lastBlink > 2600) {
            lastBlink = ts;
            const eyes = document.querySelectorAll(
              'g[id*="Fish"] circle[fill="white"], g[id*="Fish"] circle[fill="#0d2a5e"], g[id*="Fish"] circle[fill="#37474f"], g[transform="translate(392,192)"] circle[cx="52"], g[transform="translate(392,192)"] circle[cx="53.2"]',
            );
            eyes.forEach((eye) => {
              eye.style.transformBox = "fill-box";
              eye.style.transformOrigin = "center";
              eye.style.transition = "transform 90ms ease";
              eye.style.transform = "scaleY(0.12)";
              setTimeout(() => {
                eye.style.transform = "scaleY(1)";
              }, 110);
            });
          }
          requestAnimationFrame(blink);
        }
        requestAnimationFrame(blink);
      })();
    </script>
  </body>
</html>
