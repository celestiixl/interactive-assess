<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Gulf Dead Zone Phenomenon Preview</title>
  <desc id="desc">Nighttime gulf scene showing runoff, algae bloom, and oxygen decline.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070f1d" />
      <stop offset="100%" stop-color="#0b1a31" />
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06233a" />
      <stop offset="70%" stop-color="#0d3b3c" />
      <stop offset="100%" stop-color="#145a3f" />
    </linearGradient>
    <radialGradient id="bloom" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#71f7b5" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#26a369" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#sky)" />
  <circle cx="1050" cy="94" r="34" fill="#e5f3ff" opacity="0.9" />

  <rect y="240" width="1200" height="435" fill="url(#water)" />
  <rect y="230" width="520" height="55" fill="#2a4a2b" opacity="0.9" />

  <path d="M210 248 C 330 298, 450 275, 560 292" fill="none" stroke="#2aa7e0" stroke-width="11" stroke-dasharray="22 14" opacity="0.9" />
  <path d="M560 292 C 705 315, 780 308, 888 276" fill="none" stroke="#df9a1b" stroke-width="6" opacity="0.95" />

  <ellipse cx="835" cy="335" rx="190" ry="92" fill="url(#bloom)" />
  <circle cx="800" cy="326" r="34" fill="#4ade80" opacity="0.8" />
  <circle cx="850" cy="306" r="43" fill="#86efac" opacity="0.82" />
  <circle cx="898" cy="338" r="31" fill="#34d399" opacity="0.76" />

  <g transform="translate(720 455)">
    <ellipse cx="0" cy="0" rx="36" ry="14" fill="#bdd7e6" />
    <polygon points="-36,0 -58,-16 -58,16" fill="#9eb8c9" />
    <circle cx="22" cy="0" r="3" fill="#0f172a" />
    <line x1="-8" y1="-9" x2="8" y2="9" stroke="#ef4444" stroke-width="2" />
  </g>

  <g transform="translate(785 498) scale(0.9)">
    <ellipse cx="0" cy="0" rx="36" ry="14" fill="#9ac0d8" />
    <polygon points="-36,0 -58,-16 -58,16" fill="#7ca3bd" />
    <circle cx="22" cy="0" r="3" fill="#0f172a" />
    <line x1="-8" y1="-9" x2="8" y2="9" stroke="#ef4444" stroke-width="2" />
  </g>

  <g fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-weight="700">
    <text x="80" y="110" font-size="42">Phenomenon Preview</text>
    <text x="80" y="160" font-size="58">Gulf Dead Zone</text>
  </g>

  <g fill="#9cc7df" font-family="'JetBrains Mono', monospace" font-size="29" font-weight="700">
    <text x="80" y="358">1) nitrogen runoff</text>
    <text x="654" y="232">2) algae bloom</text>
    <text x="654" y="565">3) oxygen gone</text>
  </g>
</svg>
